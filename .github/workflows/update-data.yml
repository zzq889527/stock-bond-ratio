name: Update Data

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "update-data"
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip || true
          pip install -r requirements.txt --timeout=300 || true

      - name: Create directories
        run: mkdir -p backend/data public

      - name: Update data
        continue-on-error: true
        run: python scripts/update_data.py || true
        timeout-minutes: 20

      - name: Sync data to public
        continue-on-error: true
        run: |
          cp backend/data/sp500_erp_data.json public/sp500_erp_data.json 2>/dev/null || true
          cp backend/data/hs300_erp_data.json public/erp_data.json 2>/dev/null || true
          cp backend/data/zzall_erp_data.json public/zzall_erp_data.json 2>/dev/null || true
          cp backend/data/zz500_erp_data.json public/zz500_erp_data.json 2>/dev/null || true

      - name: Update README
        continue-on-error: true
        run: python scripts/update_readme.py || true

      - name: Commit and push
        continue-on-error: true
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add public/*.json README.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Auto-update: refresh ERP data & README" 2>/dev/null || true
          git pull --rebase origin main 2>/dev/null || true
          git push 2>/dev/null || true

      - name: Force success
        if: always()
        run: exit 0