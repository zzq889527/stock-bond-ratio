name: Update Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --timeout=120

      - name: Create directories
        run: |
          mkdir -p backend/data public

      - name: Update data
        shell: bash
        run: |
          set -eo pipefail
          export PYTHONUNBUFFERED=1
          python scripts/update_data.py

      - name: Sync data to public
        shell: bash
        run: |
          cp backend/data/sp500_erp_data.json public/sp500_erp_data.json
          cp backend/data/hs300_erp_data.json public/erp_data.json
          cp backend/data/zzall_erp_data.json public/zzall_erp_data.json
          cp backend/data/zz500_erp_data.json public/zz500_erp_data.json

      - name: Check for changes
        id: check_changes
        run: |
          git add public/*.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update: refresh ERP data"
          git push